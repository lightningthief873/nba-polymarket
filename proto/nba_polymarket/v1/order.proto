syntax = "proto3";

package nba_polymarket.v1;

import "nba_polymarket/v1/common.proto";
import "nba_polymarket/v1/market.proto";

option java_package = "com.nba_polymarket.v1";
option java_outer_classname = "OrderProto";
option java_multiple_files = true;

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_GTC = 1;
  ORDER_TYPE_FOK = 2;
  ORDER_TYPE_IOC = 3;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING = 1;
  ORDER_STATUS_OPEN = 2;
  ORDER_STATUS_PARTIALLY_FILLED = 3;
  ORDER_STATUS_FILLED = 4;
  ORDER_STATUS_CANCELED = 5;
  ORDER_STATUS_REJECTED = 6;
}

message Order {
  EventMetadata meta = 1;
  string order_id = 2;
  string strategy_id = 3;
  string condition_id = 4;
  string token_id = 5;
  Side side = 6;
  OrderType type = 7;
  double price = 8;
  double size = 9;
  OrderStatus status = 10;
}

message Fill {
  EventMetadata meta = 1;
  string order_id = 2;
  double price = 3;
  double size = 4;
  double fee = 5;
}

message Position {
  string condition_id = 1;
  string token_id = 2;
  double size = 3;
  double avg_entry_price = 4;
  double unrealized_pnl = 5;
  double realized_pnl = 6;
}
