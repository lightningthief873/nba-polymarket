syntax = "proto3";

package nba_polymarket.v1;

option java_package = "com.nba_polymarket.v1";
option java_outer_classname = "CommonProto";
option java_multiple_files = true;

enum Source {
  SOURCE_UNSPECIFIED = 0;
  SOURCE_POLYMARKET_WS = 1;
  SOURCE_POLYMARKET_REST = 2;
  SOURCE_NBA_API = 3;
  SOURCE_ESPN = 4;
  SOURCE_SIMULATOR_REPLAY = 5;
  SOURCE_SIMULATOR_SYNTHETIC = 6;
}

message EventMetadata {
  int64 timestamp_ns = 1;
  int64 ingested_ns = 2;
  Source source = 3;
  string trace_id = 4;
}
