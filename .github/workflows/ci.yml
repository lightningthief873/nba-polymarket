name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  ERLANG_VERSION: "27.1.2"
  REBAR3_VERSION: "3.24.0"

# Python, proto-lint, and integration jobs are added in later phases.

jobs:
  erlang-rust:
    name: Build & Test (Erlang + Rust NIF)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Erlang/OTP + rebar3
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.ERLANG_VERSION }}
          rebar3-version: ${{ env.REBAR3_VERSION }}

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache rebar3 deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: rebar3-${{ runner.os }}-${{ hashFiles('rebar.config') }}
          restore-keys: rebar3-${{ runner.os }}-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('nifs/hello/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Rust fmt check
        run: cargo fmt --manifest-path nifs/hello/Cargo.toml -- --check

      - name: Rust clippy
        run: cargo clippy --manifest-path nifs/hello/Cargo.toml -- -D warnings

      - name: Build (NIF + Erlang)
        run: make build

      - name: Test
        run: make test

      - name: Dialyzer
        run: rebar3 dialyzer

      - name: Upload CT logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ct-logs
          path: _build/test/logs/
          if-no-files-found: ignore
