name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  ERLANG_VERSION: "27.1.2"
  REBAR3_VERSION: "3.24.0"
  BUF_VERSION: "1.45.0"

jobs:
  erlang-rust:
    name: Build & Test (Erlang + Rust + Python)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Erlang/OTP + rebar3
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.ERLANG_VERSION }}
          rebar3-version: ${{ env.REBAR3_VERSION }}

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python proto tools
        run: pip3 install grpcio-tools protobuf

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install buf
        run: |
          curl -sSL \
            "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64" \
            -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf

      - name: Cache rebar3 deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: rebar3-${{ runner.os }}-${{ hashFiles('rebar.config') }}
          restore-keys: rebar3-${{ runner.os }}-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('nifs/hello/Cargo.toml', 'nifs/proto_codec/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: buf lint
        run: buf lint proto

      - name: buf breaking (against main)
        if: github.event_name == 'pull_request'
        run: buf breaking proto --against '.git#branch=main,subdir=proto'

      - name: Rust fmt check
        run: |
          cargo fmt --manifest-path nifs/hello/Cargo.toml -- --check
          cargo fmt --manifest-path nifs/proto_codec/Cargo.toml -- --check

      - name: Rust clippy
        run: |
          cargo clippy --manifest-path nifs/hello/Cargo.toml -- -D warnings
          cargo clippy --manifest-path nifs/proto_codec/Cargo.toml \
            --no-default-features -- -D warnings

      - name: Build (NIF + proto_codec + Erlang)
        run: make build

      - name: Test
        run: make test

      - name: Dialyzer
        run: rebar3 dialyzer

      - name: Upload CT logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ct-logs
          path: _build/test/logs/
          if-no-files-found: ignore
