version: '3.9'

services:
  questdb:
    image: questdb/questdb:8.1.4
    ports:
      - "9000:9000"   # HTTP / UI
      - "9009:9009"   # InfluxDB line protocol
      - "8812:8812"   # PostgreSQL wire
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      QDB_CAIRO_COMMIT_LAG: 1000
      QDB_CAIRO_MAX_UNCOMMITTED_ROWS: 100000

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    volumes:
      - redis_data:/data

volumes:
  questdb_data:
  redis_data:
